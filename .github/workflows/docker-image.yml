name: docker-image
permissions:
  packages: write
  pull-requests: write
jobs:
  build-image-with-buildah:
    if: ${{ ! (startsWith(github.event_name, 'pull_request') && github.event.action == 'closed' ) }}
    runs-on: ubuntu-22.04
    steps:
    - if: startsWith(github.event_name, 'pull_request')
      name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: GARALT debug probe
      run: |-
        printf "GARALT_DBG: github.event.pull_request.head.sha: %s\n" "${{ github.event.pull_request.head.sha }}"
        if [ -f Dockerfile ]; then
          echo "GARALT_DBG: Dockerfile found. Content:"
          cat Dockerfile
        else
          echo "GARALT_DBG: Dockerfile not found"
          ls -R
        fi
      continue-on-error: true
    - name: Build with buildah
      run: buildah bud .
  generate-docker-metadata:
    uses: elcolloff/vagrant-libvirt/.github/workflows/docker-meta.yml@main
    secrets: inherit
  generate-docker-metadata-slim:
    uses: elcolloff/vagrant-libvirt/.github/workflows/docker-meta.yml@main
    with:
      flavor: |
        suffix=-slim
    secrets: inherit
  build-docker-image:
    if: ${{ ! (startsWith(github.event_name, 'pull_request') && github.event.action == 'closed' ) }}
    runs-on: ubuntu-22.04
    needs:
    - generate-docker-metadata
    - generate-docker-metadata-slim
    steps:
    - if: startsWith(github.event_name, 'pull_request')
      name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver-opts: image=moby/buildkit:master
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: GARALT debug probe
      run: |-
        printf "GARALT_DBG: github.event.pull_request.head.sha: %s\n" "${{ github.event.pull_request.head.sha }}"
        if [ -f Dockerfile ]; then
          echo "GARALT_DBG: Dockerfile found. Content:"
          cat Dockerfile
        else
          echo "GARALT_DBG: Dockerfile not found"
          ls -R
        fi
      continue-on-error: true
    - name: Build and push main image
      id: docker_build
      uses: docker/build-push-action@v4
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ needs.generate-docker-metadata.outputs.tags }}
        target: final
        labels: ${{ needs.generate-docker-metadata.outputs.labels }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
    - name: Build and push slim image
      id: docker_build_slim
      uses: docker/build-push-action@v4
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ needs.generate-docker-metadata-slim.outputs.tags }}
        target: slim
        labels: ${{ needs.generate-docker-metadata-slim.outputs.labels }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}
    - name: Image digest Slim
      run: echo ${{ steps.docker_build_slim.outputs.digest }}
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
    tags:
    - '*.*.*'
  pull_request_target:
    types:
    - assigned
    - opened
    - synchronize
    - reopened
    - closed
    paths-ignore:
    - docs/**
    - .github/workflows/publish-documentation*
    - .github/workflows/deploy-docs*
